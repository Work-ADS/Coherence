@if (dot()) {
  <span
    [class]="dotClasses()"
    role="status"
    [attr.aria-label]="ariaLabel()"
  ></span>
} @else {
  <span [class]="classes()" role="status">
    @if (icon()) {
      <span class="inline-flex shrink-0" aria-hidden="true">{{ icon() }}</span>
    }
    <ng-content />
  </span>
}
