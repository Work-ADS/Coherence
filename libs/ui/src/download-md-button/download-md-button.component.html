<button
  type="button"
  class="download-md"
  aria-label="Download {{ label() }}"
  (click)="download()"
>
  <!-- TODO(icon-library): replace inline SVG with icon component once icon system ships -->
  <svg class="download-md__icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M8 1v10M8 11L4.5 7.5M8 11l3.5-3.5M2 13h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <span class="download-md__label">{{ label() }}</span>
</button>
