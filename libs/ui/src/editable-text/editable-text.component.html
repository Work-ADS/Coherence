@if (!editing()) {
  <!-- Display mode -->
  <button
    type="button"
    class="edt__trigger"
    (click)="startEdit()"
    [attr.aria-label]="'Editar ' + ariaLabel()"
  >
    <span class="edt__value">
      {{ value() || placeholder() }}
    </span>
    <svg
      class="edt__icon"
      fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
      aria-hidden="true"
    >
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z" />
    </svg>
  </button>
} @else {
  <!-- Edit mode -->
  <form class="edt__form" (submit)="commit($event)">
    <input
      #inputEl
      type="text"
      class="edt__input"
      [value]="draft()"
      (input)="draft.set($any($event.target).value)"
      (keydown.escape)="cancel()"
      [placeholder]="placeholder()"
    />
    <!-- Commit -->
    <button type="submit" class="edt__action" aria-label="Confirmar">
      <svg class="edt__action-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
      </svg>
    </button>
    <!-- Cancel -->
    <button type="button" class="edt__action" aria-label="Cancelar" (click)="cancel()">
      <svg class="edt__action-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </form>
}
