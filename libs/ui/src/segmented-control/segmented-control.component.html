<div
  [class]="containerClass()"
  role="radiogroup"
  [attr.aria-label]="ariaLabel()"
>
  @for (option of options(); track option.value) {
    <button
      type="button"
      role="radio"
      [attr.aria-checked]="option.value === value()"
      [class]="optionClass(option)"
      [disabled]="option.disabled ?? false"
      (click)="select(option)"
    >
      {{ option.label }}
    </button>
  }
</div>
